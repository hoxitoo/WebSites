# Деплой сайта «Колибри» на GitHub Pages: https://hoxitoo.github.io/WebSites/
# Триггер: пуш в main (или вручную из вкладки Actions).
# Разово в настройках репо: Settings → Pages → Source: «GitHub Actions».
# Чтобы форма слала заявки в Google Таблицу: Settings → Secrets and variables →
# Actions → New repository secret → LEAD_WEBHOOK_URL = URL Apps Script (…/exec).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Calibri_gift
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Calibri_gift/package-lock.json

      - name: Install
        run: npm ci

      - name: Remove server-only API (Pages — статический хостинг)
        run: rm -rf app/api

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /WebSites
          NEXT_PUBLIC_SITE_URL: https://hoxitoo.github.io/WebSites
          NEXT_PUBLIC_LEAD_WEBHOOK_URL: ${{ secrets.LEAD_WEBHOOK_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Calibri_gift/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
